[[mgr.prepend_keymap]]
on = ["<Enter>"]
run = "plugin smart-enter"
desc = "Enter the child directory, or open the selected file"

[[mgr.prepend_keymap]]
on = ["l"]
run = "plugin smart-enter"
desc = "Enter the child directory, or open the selected file"

[[mgr.prepend_keymap]]
on = ["<Backspace>"]
run = "leave"
desc = "Go back to the parent directory"

[[mgr.prepend_keymap]]
on = ["!"]
run = 'shell "$SHELL" --block --confirm'
desc = 'Open "$SHELL" in the current directory'

[[mgr.prepend_keymap]]
on = ["g", "w"]
run = "cd $ML4W_WALLPAPERS_DIR"
desc = "Go to wallpapers directory"

[[mgr.prepend_keymap]]
on = ["g", "p"]
run = "cd $ML4W_PERSONAL_DIR"
desc = "Go to personal directory"

[[mgr.prepend_keymap]]
on = ['g', 'u']
run = "cd $ML4W_UNIVERSITY_DIR"
desc = "Go to university directory"

[[mgr.prepend_keymap]]
on = ["J"]
run = "arrow 5"
desc = "Seek down 5 units in the preview"

[[mgr.prepend_keymap]]
on = ["K"]
run = "arrow -5"
desc = "Seek up 5 units in the preview"

[[mgr.prepend_keymap]]
on = ["<A-j>"]
run = "seek 5"
desc = "Seek down 5 units in the preview"

[[mgr.prepend_keymap]]
on = ["<A-k>"]
run = "seek -5"
desc = "Seek up 5 units in the preview"
# [[manager.prepend_keymap]]

[[mgr.prepend_keymap]]
on = ["u"]
run = "undo"
desc = "Undo the last action"

[[mgr.prepend_keymap]]
on = [",", "w", "s"]
run = "plugin wallpaper --args='set'"
# run = "plugin wallpaper --args='/home/chachi/personal/wallpapers/landscape/兔女.jpg'"
desc = "Set the current image as wallpaper"

[[mgr.prepend_keymap]]
on = [",", "w", "a"]
run = "plugin wallpaper --args='archive'"
desc = "Archive the current image"

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Change the mode of the current file"

[[mgr.prepend_keymap]]
on = ["g", "r"]
run = '''
    shell 'ya pub dds-cd --str "$(git rev-parse --show-toplevel)"' --confirm
'''
desc = "Go to the previous directory"

[[mgr.prepend_keymap]]
on = [",", "i", "r"]
run = "plugin image_cli --args='set'"
desc = "Rotate image"

[[mgr.prepend_keymap]]
on = [",", "i", "a"]
run = "plugin image_cli"
desc = "Rotate image_cli"

[[mgr.prepend_keymap]]
on = ["b", "s"]
run = "plugin bookmarks save"
desc = "Save current position as a bookmark"

[[mgr.prepend_keymap]]
on = ["b", "j"]
run = "plugin bookmarks jump"
desc = "Jump to a bookmark"

[[mgr.prepend_keymap]]
on = ["b", "d"]
run = "plugin bookmarks delete"
desc = "Delete a bookmark"

[[mgr.prepend_keymap]]
on = ["b", "D"]
run = "plugin bookmarks delete_all"
desc = "Delte all bookmarks"

[[mgr.prepend_keymap]]
on = ["u"]
run = "plugin restore"
desc = "Restore the last deleted file"

[[mgr.prepend_keymap]]
on = ["d", "d"]
run = "remove"                # remove - Trash selected files
desc = "Trash selected files"

[[mgr.prepend_keymap]]
on = ["d", "u"]
run = "plugin restore"
desc = "Restore the last deleted file"

[[mgr.prepend_keymap]]
on = ["M", "m"]
run = "plugin mount"
desc = "Launch mount plugin"
# or this if you want to jump to mountpoint after mounted
[[mgr.prepend_keymap]]
on = ["M", "a"]
run = "plugin simple-mtpfs -- select-then-mount --jump"
desc = "Select device to mount and jump to its mount point"

# This will remount device under cwd (e.g. cwd = $HOME/Media/1_ZTEV5/Downloads/, device mountpoint = $HOME/Media/1_ZTEV5/)
[[mgr.prepend_keymap]]
on = ["M", "r"]
run = "plugin simple-mtpfs -- remount-current-cwd-device"
desc = "Remount device under cwd"

[[mgr.prepend_keymap]]
on = ["M", "u"]
run = "plugin simple-mtpfs -- select-then-unmount"
desc = "Select device then unmount"

[[mgr.prepend_keymap]]
on = ["g", "m"]
run = "plugin simple-mtpfs -- jump-to-device"
desc = "Select device then jump to its mount point"

[[mgr.prepend_keymap]]
on = ["`", "`"]
run = "plugin simple-mtpfs -- jump-back-prev-cwd"
desc = "Jump back to the position before jumped to device"

[[mgr.prepend_keymap]]
on = ["<C-w>"]
run = 'shell -- waypaper --wallpaper %h'
desc = "Set hovered file as wallpaper"
